name: "${PROFILE_ENV:-X}-svc-casdoor"

services:
  db-postgres-common:
    container_name: db-postgres-common
    hostname: db-postgres-common
    image: quay.io/labnow/postgres-17:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      POSTGRES_DB: casdoor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["35432:5432"]
    networks: ["net-moa"]
    volumes:
      - /data/storage/pg-common:/var/lib/postgresql/data
    # su postgres && psql -d casdoor

  svc-casdoor:
      image: quay.io/labnow/casdoor
      container_name: svc-casdoor
      command: |
        /bin/bash -l -c '
        ls -alh /opt/casdoor
        echo "driverName = postgres" >> /opt/casdoor/conf/app.conf
        echo "dataSourceName = \"user=postgres password=postgres host=db-postgres port=5432 sslmode=disable dbname=casdoor\"" >> /opt/casdoor/conf/app.conf
        sleep 8s
        cat /opt/casdoor/conf/app.conf
        /opt/casdoor/server -createDatabase=true'
      ports:
        - 8000:8000
      depends_on: ["db-postgres-common"]
      healthcheck:
        test:  ["CMD-SHELL", "curl --head -fsSk http://localhost:8000/health/ready" ]
        interval: 30s
        timeout: 10s
        start_period: 5s
        retries: 3
