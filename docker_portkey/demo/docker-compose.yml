networks:
  net-portkey:

services:
  svc-portkey:
    container_name: svc-portkey
    image: docker.io/labnow/portkey:latest
    restart: unless-stopped
    networks:
      - net-portkey
    ports:
      - "13000:13000"
    environment:
      - PORT=13000
    # command: ["--headless"]
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
