name: "${PROFILE_ENV:-X}-proxy-clash"


networks:
  net-proxy:
    driver: bridge
    ipam:
      config:
      - subnet: 172.30.0.0/24


services:
  svc-proxy-clash:
    image: quay.io/labnow/clash:latest # This image will be built with the modified Dockerfile
    container_name: svc-clash
    hostname: svc-clash
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv4.ip_forward: 1
    environment:
      TZ: Asia/Shanghai
      PROFILE_LOCALIZE: aliyun-pub
      PROXY_PROVIDER: https://raw.githubusercontent.com/snakem982/proxypool/main/source/clash-meta.yaml
    volumes:
      - ./work:/opt/clash/config
    ports: []   # host mode does not require port mapping
