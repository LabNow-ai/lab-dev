# notice: update proxy provider in the `proxy-providers` section and `use` section.
# ref 1: https://wiki.metacubex.one/example/#meta
# ref 2: https://github.com/MetaCubeX/mihomo/blob/Alpha/docs/config.yaml
# ref 3: https://gist.github.com/liuran001/5ca84f7def53c70b554d3f765ff86a33

# ------------------------- templates -------------------------
pr:
  &pr {
    type: select,
    proxies: [NODE-SELECT, R-HK, R-TW, R-JP, R-SG, R-US, R-OTHERS, ALL-NODES, AUTO-SELECT, DIRECT]
  }

p: &p
  type: http
  interval: 3600
  health-check:
    enable: true
    url: https://www.gstatic.com/generate_204
    expected-status: 204
    interval: 300
    timeout: 1000
    tolerance: 100


# ------------------------- proxy provider and config -------------------------
use: &use
  type: url-test  # or select
  use:
    - proxy-provider-1
    # - proxy-provider-2

proxy-providers:
  proxy-provider-1:
    <<: *p
    url: "PROXY_PROVIDER"  # e.g.: https://your.subscription.com/should-be-filled-here


# ------------------------- rule provider config -------------------------
rule-providers:
  # black list of ADs: https://github.com/privacy-protection-tools/anti-AD
  anti-AD:
    type: http
    behavior: domain
    format: yaml
    url: "https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-clash.yaml?"
    interval: 600

  # white list of ADs: https://github.com/privacy-protection-tools/dead-horse
  anti-AD-white:
    type: http
    behavior: domain
    format: yaml
    url: "https://raw.githubusercontent.com/privacy-protection-tools/dead-horse/master/anti-ad-white-for-clash.yaml?"
    interval: 600


# ------------------------- system config -------------------------
mode: rule
mixed-port: 7890
redir-port: 7892
tproxy-port: 7893
allow-lan: true
secret: ''
ipv6: false
bind-address: '*'
tcp-concurrent: true

log-level: info
unified-delay: true

find-process-mode: off # always, strict, off
keep-alive-interval: 1800
global-client-fingerprint: random

# Sniffer configuration to extract domain names from TLS SNI and HTTP Host headers
# This ensures domain-based routing works even if client resolves real IPs (e.g. via Docker's 127.0.0.11)
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]

profile:
  store-selected: true
  store-fake-ip: true

external-controller: :9090
external-ui: /opt/clash/
external-ui-name: ui-zashboard


# ------------------------- dns and network config -------------------------
dns:
  enable: true
  ipv6: false
  listen: ":1053"
  use-hosts: true
  use-system-hosts: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
  - '+.lan'
  - '+.local'
  - dns.msftncsi.com
  - www.msftncsi.com
  - www.msftconnecttest.com
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  - 114.114.114.114
  - 8.8.8.8
  nameserver:
  - https://dns.cloudflare.com/dns-query
  - https://dns.google/dns-query
  nameserver-policy:
    "geosite:cn":
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
  - https://doh.dns.sb/dns-query
  - https://dns.cloudflare.com/dns-query
  - https://dns.twnic.tw/dns-query
  - tls://8.8.4.4:853
  fallback-filter:
    geoip: true
    ipcidr:
    - 240.0.0.0/4
    - 0.0.0.0/32

tun:
  enable: false
  stack: system
  device: tun
  auto-route: false
  auto-redir: false
  strict-route: false
  auto-detect-interface: false
  dns-hijack:
  - any:53
  - "tcp://any:53"
  mtu: 1500


# ------------------------- geo data config -------------------------
# Source https://github.com/MetaCubeX/meta-rules-dat
geodata-mode: true
geox-url:
  geoip: "https://hub.gitmirror.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://hub.gitmirror.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://hub.gitmirror.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"


# ------------------------- proxy groups and rules -------------------------
proxy-groups:
  - { name: AUTO-SELECT, <<: *use, type: url-test , tolerance: 2}
  - { name: NODE-SELECT, type: select, proxies: [ALL-NODES, AUTO-SELECT, R-HK, R-TW, R-JP, R-SG, R-US, R-OTHERS, DIRECT] }
  - { name: ALL-NODES, <<: *use }
  - { name: FALLBACK, <<: *use, type: fallback }
  - { name: ANTI-AD, type: select, proxies: [REJECT, DIRECT, NODE-SELECT] }

  # - { name: DNS, <<: *pr }  # иҝҷйҮҢзҡ„ dns жҢҮжө·еӨ–и§Јжһҗ dns иө°зҡ„иҠӮзӮ№пјҢдёҖиҲ¬и·ҹйҡҸNODE-SELECTеҚіеҸҜ
  # еҰӮдҪҝз”ЁWARPйңҖжүӢеҠЁеңЁдёӢж–№зҡ„proxiesеӯ—ж®өеҶ…ж·»еҠ  WARP, еҰӮ [WARP, ALL-NODES, AUTO-SELECT, R-HK, R-TW, R-JP, R-SG, R-US, R-OTHERS, DIRECT]
  # - { name: CF-WARP, <<: *pr, exclude-type: "wireguard" }  # WARP й…ҚзҪ®й“ҫејҸеҮәз«ҷ

  - { name: OpenAI, <<: *pr }
  - { name: Apple, <<: *pr }  # Apple жҺЁиҚҗиө°е…ЁеұҖзӣҙиҝһ
  - { name: Google, <<: *pr }
  - { name: Telegram, <<: *pr }
  - { name: Twitter, <<: *pr }
  - { name: YouTube, <<: *pr }
  - { name: NETFLIX, <<: *pr }
  - { name: Spotify, <<: *pr }
  - { name: Github, <<: *pr }
  - { name: Steam, <<: *pr }
  - { name: OneDrive, <<: *pr }
  - { name: MSFT, <<: *pr }
  - { name: е…¶д»–, <<: *pr }

  # regions
  - { name: R-CN, <<: *pr, proxies: [DIRECT, NODE-SELECT, R-HK, R-TW, R-JP, R-SG, R-US, R-OTHERS, ALL-NODES, AUTO-SELECT]}
  - { name: R-HK, <<: *use, filter: "(?i)жёҜ|hk|hongkong|hong kong" }
  - { name: R-TW, <<: *use, filter: "(?i)еҸ°|tw|taiwan" }
  - { name: R-JP, <<: *use, filter: "(?i)R-JP|jp|japan" }
  - { name: R-US, <<: *use, filter: "(?i)зҫҺ|us|unitedstates|united states" }
  - { name: R-SG, <<: *use, filter: "(?i)(ж–°|sg|singapore)" }
  - { name: R-OTHERS, <<: *use, filter: "(?i)^(?!.*(?:рҹҮӯрҹҮ°|рҹҮҜрҹҮө|рҹҮәрҹҮё|рҹҮёрҹҮ¬|рҹҮЁрҹҮі|жёҜ|hk|hongkong|еҸ°|tw|taiwan|ж—Ҙ|jp|japan|ж–°|sg|singapore|зҫҺ|us|unitedstates)).*" }

rules:
  # иӢҘйңҖзҰҒз”Ё QUIC иҜ·еҸ–ж¶ҲжіЁйҮҠ QUIC дёӨжқЎи§„еҲҷ, йҳІжӯў YouTube зӯүдҪҝз”Ё QUIC еҜјиҮҙйҖҹеәҰдёҚдҪі, зҰҒз”Ё 443 з«ҜеҸЈ UDP жөҒйҮҸпјҲдёҚеҢ…жӢ¬еӣҪеҶ…пјү
  # - AND,(AND,(DST-PORT,443),(NETWORK,UDP)),(NOT,((GEOSITE,cn))),REJECT # quic
  - AND,((RULE-SET,anti-AD),(NOT,((RULE-SET,anti-AD-white)))),ANTI-AD
  - GEOSITE,openai,OpenAI
  - GEOSITE,apple,Apple
  - GEOSITE,apple-cn,Apple
  - GEOSITE,github,Github
  - GEOSITE,twitter,Twitter
  - GEOSITE,youtube,YouTube
  - GEOSITE,google,Google
  - GEOSITE,google-cn,Google
  - GEOSITE,telegram,Telegram
  - GEOSITE,netflix,NETFLIX
  - GEOSITE,spotify,Spotify
  - GEOSITE,onedrive,OneDrive
  - GEOSITE,microsoft,MSFT
  - GEOSITE,geolocation-!cn,е…¶д»–
  # - AND,(AND,(DST-PORT,443),(NETWORK,UDP)),(NOT,((GEOIP,CN))),REJECT # quic
  - GEOIP,google,Google
  - GEOIP,netflix,NETFLIX
  - GEOIP,telegram,Telegram
  - GEOIP,twitter,Twitter
  - GEOSITE,CN,R-CN
  - GEOIP,CN,R-CN
  - MATCH,AUTO-SELECT
